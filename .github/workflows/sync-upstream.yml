name: sync-upstream

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || true
          git fetch upstream main --tags

      - name: Get latest upstream tag
        id: tag
        run: |
          UPSTREAM_TAG=$(git ls-remote --refs --tags https://github.com/router-for-me/CLIProxyAPI.git "v*" | awk -F/ '{print $3}' | sort -V | tail -n 1)
          if [ -z "$UPSTREAM_TAG" ]; then
            exit 1
          fi
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: ${UPSTREAM_TAG}"

      - name: Check if sync needed
        id: check
        run: |
          UPSTREAM_TAG="${{ steps.tag.outputs.upstream_tag }}"
          CUSTOM_TAG="${UPSTREAM_TAG}-custom"
          
          if git tag -l "$CUSTOM_TAG" | grep -q "$CUSTOM_TAG"; then
            echo "need_sync=false" >> $GITHUB_OUTPUT
            echo "已同步过版本: ${CUSTOM_TAG}"
          else
            echo "need_sync=true" >> $GITHUB_OUTPUT
            echo "需要同步: ${CUSTOM_TAG}"
          fi

      - name: Merge upstream
        if: steps.check.outputs.need_sync == 'true'
        run: |
          git checkout main
          git merge upstream/main --no-edit -m "同步上游更新" || {
            echo "合并有冲突，尝试保留自定义修改..."
            git checkout --ours internal/runtime/executor/codex_executor.go 2>/dev/null || true
            git add -A
            git commit -m "同步上游更新（保留自定义修改）" --no-edit || true
          }
          git push origin main

      - name: Create tag
        if: steps.check.outputs.need_sync == 'true'
        run: |
          UPSTREAM_TAG="${{ steps.tag.outputs.upstream_tag }}"
          CUSTOM_TAG="${UPSTREAM_TAG}-custom"
          
          git tag "$CUSTOM_TAG"
          git push origin "$CUSTOM_TAG"
          
          echo "已创建 tag: ${CUSTOM_TAG}"
          echo "Docker 构建将自动触发"
