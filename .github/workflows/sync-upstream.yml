name: sync-upstream

on:
  schedule:
    # 每小时检查一次上游更新
    - cron: '0 * * * *'
  workflow_dispatch:
    # 手动触发同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git || true
          git fetch upstream --tags

      - name: Check upstream updates
        id: check
        run: |
          # 获取上游最新 commit
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse main)
          
          # 获取上游最新 tag
          UPSTREAM_TAG=$(git describe --tags `git rev-list --tags --max-count=1` --abbrev=0 upstream/main)
          
          echo "upstream_commit=${UPSTREAM_COMMIT}" >> $GITHUB_OUTPUT
          echo "upstream_tag=${UPSTREAM_TAG}" >> $GITHUB_OUTPUT
          
          # 检查是否需要同步
          if [ "$UPSTREAM_COMMIT" != "$LOCAL_COMMIT" ]; then
            echo "need_sync=true" >> $GITHUB_OUTPUT
            echo "上游有更新: ${UPSTREAM_TAG}"
          else
            echo "need_sync=false" >> $GITHUB_OUTPUT
            echo "已同步到上游最新版本"
          fi

      - name: Merge upstream
        if: steps.check.outputs.need_sync == 'true'
        run: |
          git checkout main
          git merge upstream/main --no-edit -m "同步上游更新 ${UPSTREAM_TAG}"
          git push origin main
          
          # 创建自定义 tag
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
          CUSTOM_TAG="${UPSTREAM_TAG}-custom"
          
          # 删除旧的 custom tag（如果存在）
          git tag -d "$CUSTOM_TAG" || true
          git push origin --delete "$CUSTOM_TAG" || true
          
          # 创建新 tag
          git tag "$CUSTOM_TAG"
          git push origin "$CUSTOM_TAG"
          
          echo "已创建 tag: ${CUSTOM_TAG}"

      - name: Trigger docker build
        if: steps.check.outputs.need_sync == 'true'
        run: |
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
          echo "上游版本: ${UPSTREAM_TAG}"
          echo "将触发 docker-image workflow 构建 mcheiyue/cli-proxy-api:${UPSTREAM_TAG}-custom"