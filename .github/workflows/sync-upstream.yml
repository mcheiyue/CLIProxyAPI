name: sync-upstream

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || true
          git fetch upstream --tags 2>/dev/null || git fetch upstream

      - name: Check upstream updates
        id: check
        run: |
          git fetch upstream --tags 2>/dev/null || true
          
          UPSTREAM_TAG=$(git describe --tags `git rev-list --tags --max-count=1` --abbrev=0 upstream/main 2>/dev/null || git tag -l 'v*' --sort=-v:refname upstream | head -1)
          
          echo "upstream_tag=${UPSTREAM_TAG}" >> $GITHUB_OUTPUT
          
          CUSTOM_TAG="${UPSTREAM_TAG}-custom"
          
          if git tag -l "$CUSTOM_TAG" | grep -q "$CUSTOM_TAG"; then
            echo "need_sync=false" >> $GITHUB_OUTPUT
            echo "已同步到上游版本: ${UPSTREAM_TAG}"
          else
            echo "need_sync=true" >> $GITHUB_OUTPUT
            echo "上游版本: ${UPSTREAM_TAG}，需要同步"
          fi

      - name: Merge upstream
        if: steps.check.outputs.need_sync == 'true'
        run: |
          git checkout main
          git merge upstream/main --no-edit -m "同步上游更新" || {
            echo "合并有冲突，尝试自动解决..."
            git diff --name-only --diff-filter=U
            git checkout --ours internal/runtime/executor/codex_executor.go 2>/dev/null || true
            git add -A
            git commit -m "同步上游更新（保留自定义修改）" --no-edit || true
          }
          git push origin main
          
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
          CUSTOM_TAG="${UPSTREAM_TAG}-custom"
          
          git tag "$CUSTOM_TAG" 2>/dev/null || git tag -d "$CUSTOM_TAG" && git tag "$CUSTOM_TAG"
          git push origin "$CUSTOM_TAG"
          
          echo "已创建 tag: ${CUSTOM_TAG}"

      - name: Trigger docker build
        if: steps.check.outputs.need_sync == 'true'
        run: |
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
          echo "上游版本: ${UPSTREAM_TAG}"
          echo "将触发 docker-image workflow 构建 mcheiyue/cli-proxy-api:${UPSTREAM_TAG}-custom"